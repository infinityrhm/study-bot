<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Bot Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #000; /* Черный фон как на скринах */
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .profile-card {
            background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #3a3a3c;
        }
        .avatar {
            width: 60px;
            height: 60px;
            background: #34c759; /* Зеленый круг как на скрине */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
        }
        .info h2 { margin: 0; font-size: 18px; }
        .info p { margin: 5px 0 0; color: #8e8e93; font-size: 14px; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        .stat-card {
            background: #1c1c1e;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #3a3a3c;
        }
        .xp-bar {
            width: 100%;
            height: 8px;
            background: #3a3a3c;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        .xp-progress {
            width: 65%; /* Это будем менять динамически */
            height: 100%;
            background: #bf5af2; /* Фиолетовый прогресс */
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar" id="user-avatar">?</div>
        <div class="info">
            <h2 id="user-name">Загрузка...</h2>
            <p id="user-class">10-Г • Школа</p>
        </div>
    </div>

    <div class="stat-card" style="margin-top: 15px;">
        <div style="display: flex; justify-content: space-between;">
            <span>Уровень 4</span>
            <span>680 XP</span>
        </div>
        <div class="xp-bar"><div class="xp-progress"></div></div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">🔥 4 дня <br><small>без долгов</small></div>
        <div class="stat-card">🏆 4 <br><small>рекорд</small></div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        // Берем имя пользователя прямо из Telegram
        if (tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name + " " + (tg.initDataUnsafe.user.last_name || "");
            document.getElementById('user-avatar').innerText = tg.initDataUnsafe.user.first_name[0];
        }
    </script>
</body>
</html>
