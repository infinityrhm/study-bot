<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study UA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0c0c0e; --card: #1c1c1e; --accent: #34c759; --text: #ffffff; --subtext: #8e8e93;
        }
        body.light-theme {
            --bg: #f2f2f7; --card: #ffffff; --text: #000000; --subtext: #3a3a3c;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, sans-serif; margin: 0; padding: 0; transition: 0.3s;
        }
        .page { display: none; padding: 20px; padding-bottom: 100px; animation: fadeIn 0.2s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-card {
            background: var(--card); border-radius: 24px; padding: 20px;
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05);
        }
        .profile-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }

        /* Кнопки налаштувань */
        .settings-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .settings-btn {
            background: rgba(142, 142, 147, 0.1); border: none; color: var(--text);
            padding: 10px 15px; border-radius: 12px; font-size: 14px; flex: 1; min-width: 80px;
        }
        .settings-btn.active { background: var(--accent); color: white; font-weight: bold; }

        .game-item { background: var(--card); border-radius: 20px; padding: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }

        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 12px 0 30px; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .nav-item { color: var(--subtext); text-decoration: none; text-align: center; font-size: 11px; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; margin-bottom: 4px; }

        canvas { background: #000; border-radius: 15px; display: block; margin: 0 auto; touch-action: none; }
    </style>
</head>
<body class="dark-theme">

    <div id="home" class="page active">
        <div class="glass-card" style="display: flex; align-items: center; gap: 15px;">
            <div id="user-avatar-placeholder" class="profile-img" style="background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold;">?</div>
            <div>
                <h2 style="margin:0; font-size: 20px;" id="welcome-txt">Вітаємо!</h2>
                <p style="margin:0; color: var(--subtext); font-size: 13px;" id="sub-welcome">Готовий до навчання?</p>
            </div>
        </div>
        <div class="glass-card">
            <h3 id="schedule-title"><i class="fas fa-calendar-day"></i> Розклад</h3>
            <p id="schedule-desc" style="color: var(--subtext);">Увійдіть через Classroom, щоб побачити дані.</p>
        </div>
    </div>

    <div id="games" class="page">
        <h2 id="games-title">Ігровий центр</h2>
        <div id="games-menu" class="game-grid" style="display: grid; grid-template-columns: 1fr; gap: 15px;">
            <div class="game-item" onclick="launchSnake()">
                <i class="fas fa-snake" style="font-size: 40px; color: var(--accent);"></i>
                <h4 style="margin: 10px 0 0;">Змійка</h4>
            </div>
        </div>
        <div id="snake-game-box" style="display: none; text-align: center;">
            <canvas id="snakeCanvas" width="300" height="300"></canvas>
            <button class="settings-btn" onclick="exitGame()" style="margin-top:20px; width:100%" id="btn-exit-game">Вийти</button>
        </div>
    </div>

    <div id="profile" class="page">
        <h2 id="settings-title">Налаштування</h2>
        <div class="glass-card">
            <h4 id="lang-label">Мова</h4>
            <div class="settings-group">
                <button class="settings-btn lang-btn active" onclick="setLanguage('uk', this)">UA</button>
                <button class="settings-btn lang-btn" onclick="setLanguage('ru', this)">RU</button>
                <button class="settings-btn lang-btn" onclick="setLanguage('en', this)">EN</button>
            </div>
        </div>
        <div class="glass-card">
            <h4 id="theme-label">Тема</h4>
            <div class="settings-group">
                <button class="settings-btn theme-btn active" onclick="setTheme('dark', this)">Dark</button>
                <button class="settings-btn theme-btn" onclick="setTheme('light', this)">Light</button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active" onclick="nav('home', this)" id="nav-home"><i class="fas fa-house"></i><br><span>Головна</span></a>
        <a href="#" class="nav-item" onclick="nav('games', this)" id="nav-games"><i class="fas fa-gamepad"></i><br><span>Ігри</span></a>
        <a href="#" class="nav-item" onclick="nav('profile', this)" id="nav-profile"><i class="fas fa-user"></i><br><span>Профіль</span></a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. ПЕРЕКЛАД
        const langData = {
            uk: { welcome: "Вітаємо", sub: "Готовий до навчання?", schedule: "Розклад", sch_desc: "Увійдіть через Classroom.", games: "Ігри", settings: "Налаштування", lang: "Мова", theme: "Тема", exit: "Вийти", home: "Головна" },
            ru: { welcome: "Привет", sub: "Готов к учебе?", schedule: "Расписание", sch_desc: "Войдите через Classroom.", games: "Игры", settings: "Настройки", lang: "Язык", theme: "Тема", exit: "Выйти", home: "Главная" },
            en: { welcome: "Welcome", sub: "Ready to study?", schedule: "Schedule", sch_desc: "Login via Classroom.", games: "Games", settings: "Settings", lang: "Language", theme: "Theme", exit: "Exit", home: "Home" }
        };

        function setLanguage(lang, btn) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const d = langData[lang];
            document.getElementById('welcome-txt').innerText = d.welcome + "!";
            document.getElementById('sub-welcome').innerText = d.sub;
            document.getElementById('schedule-title').innerHTML = `<i class="fas fa-calendar-day"></i> ${d.schedule}`;
            document.getElementById('schedule-desc').innerText = d.sch_desc;
            document.getElementById('games-title').innerText = d.games;
            document.getElementById('settings-title').innerText = d.settings;
            document.getElementById('lang-label').innerText = d.lang;
            document.getElementById('theme-label').innerText = d.theme;
            document.getElementById('btn-exit-game').innerText = d.exit;
            document.getElementById('nav-home').querySelector('span').innerText = d.home;
            document.getElementById('nav-games').querySelector('span').innerText = d.games;
            document.getElementById('nav-profile').querySelector('span').innerText = d.settings;
        }

        // 2. ТЕМИ
        function setTheme(theme, btn) {
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.body.className = theme === 'light' ? 'light-theme' : 'dark-theme';
        }

        // 3. НАВІГАЦІЯ
        function nav(page, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if (page !== 'games') exitGame();
        }

        // 4. ДАНІ ТЕЛЕГРАМ
        if (tg.initDataUnsafe?.user) {
            const user = tg.initDataUnsafe.user;
            document.getElementById('welcome-txt').innerText = `Вітаємо, ${user.first_name}!`;
            document.getElementById('user-avatar-placeholder').innerText = user.first_name[0];
        }

        // 5. ЗМІЙКА
        let snakeInterval;
        function launchSnake() {
            document.getElementById('games-menu').style.display = 'none';
            document.getElementById('snake-game-box').style.display = 'block';
            runSnake();
        }
        function exitGame() {
            clearInterval(snakeInterval);
            document.getElementById('games-menu').style.display = 'grid';
            document.getElementById('snake-game-box').style.display = 'none';
        }

        function runSnake() {
            const canvas = document.getElementById("snakeCanvas");
            const ctx = canvas.getContext("2d");
            let box = 20, dir, score = 0;
            let snake = [{x: 140, y: 140}];
            let food = {x: Math.floor(Math.random()*14+1)*20, y: Math.floor(Math.random()*14+1)*20};

            // Керування (свайпи)
            let touchX, touchY;
            canvas.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; });
            canvas.addEventListener('touchmove', e => {
                let dx = e.touches[0].clientX - touchX, dy = e.touches[0].clientY - touchY;
                if (Math.abs(dx) > Math.abs(dy)) dir = dx > 0 ? "RIGHT" : "LEFT";
                else dir = dy > 0 ? "DOWN" : "UP";
                e.preventDefault();
            }, {passive: false});

            snakeInterval = setInterval(() => {
                ctx.fillStyle = "black"; ctx.fillRect(0,0,300,300);
                ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(food.x+10, food.y+10, 8, 0, Math.PI*2); ctx.fill();

                for(let i=0; i<snake.length; i++) {
                    ctx.fillStyle = i==0 ? "#34c759" : "#1a7a35";
                    ctx.fillRect(snake[i].x, snake[i].y, box-2, box-2);
                }

                let hX = snake[0].x, hY = snake[0].y;
                if(dir=="LEFT") hX -= box; if(dir=="UP") hY -= box;
                if(dir=="RIGHT") hX += box; if(dir=="DOWN") hY += box;

                if(hX==food.x && hY==food.y) {
                    food = {x: Math.floor(Math.random()*14+1)*20, y: Math.floor(Math.random()*14+1)*20};
                } else { snake.pop(); }

                if(hX<0 || hY<0 || hX>=300 || hY>=300) exitGame();
                snake.unshift({x: hX, y: hY});
            }, 150);
        }
    </script>
</body>
</html>
