<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study UA Dev Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000000; --card: #121212; --accent: #34c759; --text: #ffffff; --sub: #8e8e93; --nav: rgba(18, 18, 18, 0.96); }
        body.light-theme { --bg: #f2f2f7; --card: #ffffff; --text: #000000; --sub: #636366; --nav: rgba(245, 245, 250, 0.96); }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; transition: 0.3s; overflow-x: hidden; }
        
        .page { display: none; padding: 15px; padding-bottom: 120px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nz-card { background: var(--card); border-radius: 16px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(142,142,147,0.1); }
        .rank-dev { background: linear-gradient(45deg, #ff3b30, #ff9500); color: white; padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }

        /* Inputs */
        .dev-input { width: 100%; padding: 10px; background: #222; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; }
        .s-btn { width: 100%; padding: 12px; border-radius: 12px; border: none; background: rgba(142,142,147,0.1); color: var(--text); font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        .s-btn.active { background: var(--accent) !important; color: white !important; }

        /* Achievements */
        .ach-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .ach-item { background: var(--card); padding: 12px 5px; border-radius: 16px; text-align: center; filter: grayscale(1); opacity: 0.4; transition: 0.4s; border: 1px solid transparent; }
        .ach-item.unlocked { filter: grayscale(0); opacity: 1; border-color: var(--accent); }
        .ach-item i { font-size: 22px; color: #ffd700; display: block; margin-bottom: 5px; }
        .ach-item span { font-size: 9px; font-weight: bold; display: block; }

        /* Leaderboard */
        .leader-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #222; }
        .leader-rank { width: 30px; font-weight: bold; color: var(--accent); }
        .leader-name { flex: 1; margin-left: 10px; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--nav); display: flex; padding: 10px 0 35px; border-top: 1px solid rgba(142,142,147,0.1); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: var(--sub); text-decoration: none; font-size: 10px; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

    <div id="p-profile" class="page active">
        <div style="text-align:center; margin-bottom: 25px;">
            <div id="u-pic" style="width:80px; height:80px; border-radius:50%; background:var(--accent); margin:0 auto 10px; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:30px; color:white;">?</div>
            <h3 id="u-name">Завантаження...</h3>
            <div id="u-rank-tag"></div>
        </div>

        <div class="nz-card">
            <h4 id="txt-settings">Налаштування</h4>
            <div class="btn-group">
                <button id="lang-uk" class="s-btn" onclick="setLang('uk')">UA - Українська</button>
                <button id="lang-en" class="s-btn" onclick="setLang('en')">EN - English</button>
            </div>
            <div class="btn-group" style="margin-top:10px;">
                <button id="theme-dark" class="s-btn" onclick="setTheme('dark')">Dark Theme</button>
                <button id="theme-light" class="s-btn" onclick="setTheme('light')">Light Theme</button>
            </div>
        </div>
    </div>

    <div id="p-ach" class="page">
        <h3 id="txt-ach-title">🏆 Досягнення</h3>
        <div class="ach-grid" id="ach-container">
            </div>
    </div>

    <div id="p-top" class="page">
        <h3>📊 Топ лідерів</h3>
        <div class="nz-card" id="leaderboard">
            <div class="leader-item"><span class="leader-rank">1</span><div class="leader-name">Admin (Dev)</div><span>9999 XP</span></div>
            <div class="leader-item"><span class="leader-rank">2</span><div class="leader-name">User_77</div><span>1200 XP</span></div>
            <div class="leader-item"><span class="leader-rank">3</span><div class="leader-name">Stud_UA</div><span>850 XP</span></div>
        </div>
    </div>

    <div id="p-dev" class="page">
        <h3 style="color:#ff3b30">🛡 Developer Console</h3>
        <div class="nz-card">
            <strong>Активність:</strong>
            <div style="font-size:12px; margin-top:5px; color:var(--sub);">
                Входів: <span id="stat-logins">0</span> | Online: <span style="color:var(--accent)">1 (You)</span>
            </div>
        </div>
        
        <div class="nz-card">
            <strong>XP Control</strong>
            <input type="text" id="dev-nick-xp" class="dev-input" placeholder="@username">
            <input type="number" id="dev-amount-xp" class="dev-input" placeholder="Кількість XP">
            <button class="s-btn active" onclick="devAction('XP')">Нарахувати</button>
        </div>

        <div class="nz-card">
            <strong>Security</strong>
            <input type="text" id="dev-nick-ban" class="dev-input" placeholder="@username">
            <input type="text" id="dev-reason-ban" class="dev-input" placeholder="Причина">
            <button class="s-btn" style="background:rgba(255,59,48,0.2); color:#ff3b30;" onclick="devAction('BAN')">Заблокувати</button>
            <button class="s-btn" style="margin-top:10px;" onclick="devAction('RESET')">Скинути успіхи юзера</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active" onclick="nav('p-profile', this)"><i class="fas fa-user-circle"></i><span id="n-prof">Профіль</span></a>
        <a href="#" class="nav-item" onclick="nav('p-ach', this)"><i class="fas fa-trophy"></i><span id="n-ach">Успіхи</span></a>
        <a href="#" class="nav-item" onclick="nav('p-top', this)"><i class="fas fa-chart-line"></i><span id="n-top">Топ</span></a>
        <a href="#" class="nav-item" id="nav-dev" style="display:none;" onclick="nav('p-dev', this)"><i class="fas fa-terminal"></i><span>Dev</span></a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let state = JSON.parse(localStorage.getItem('study_v4')) || {
            lang: 'uk', theme: 'dark', unlocked: [1], logins: 0
        };

        const achievements = [
            {id: 1, name: "Перший крок", desc: "Увійдіть у додаток", icon: "fa-door-open"},
            {id: 2, name: "Поліглот", desc: "Змініть мову", icon: "fa-language"},
            {id: 3, name: "Сова", desc: "Зайдіть після 00:00", icon: "fa-moon"},
            {id: 4, name: "Світла сторона", desc: "Увімкніть світлу тему", icon: "fa-sun"},
            {id: 5, name: "Колекціонер", desc: "Отримайте 5 досягнень", icon: "fa-box"},
            {id: 6, name: "Спідранер", desc: "Перемикайте вкладки 10 разів", icon: "fa-bolt"},
            {id: 7, name: "Постійний", desc: "Другий вхід у додаток", icon: "fa-redo"},
            {id: 8, name: "Хакер", desc: "Відкрийте вкладку Dev", icon: "fa-user-secret"},
            {id: 9, name: "Терплячий", desc: "Перебудьте в додатку 5 хв", icon: "fa-clock"},
            {id: 10, name: "Багатій", desc: "Отримайте перші 100 XP", icon: "fa-coins"},
            {id: 11, name: "Легенда", desc: "Спеціальний статус розробника", icon: "fa-crown"}
        ];

        function save() { localStorage.setItem('study_v4', JSON.stringify(state)); }

        function init() {
            state.logins++;
            document.getElementById('stat-logins').innerText = state.logins;
            
            if (tg.initDataUnsafe?.user) {
                const u = tg.initDataUnsafe.user;
                document.getElementById('u-name').innerText = u.first_name;
                if(u.id === 6439834001) {
                    document.getElementById('nav-dev').style.display = 'block';
                    document.getElementById('u-rank-tag').innerHTML = '<span class="rank-dev">DEVELOPER</span>';
                    unlock(8); unlock(11);
                }
            }

            renderAchs();
            updateUI();
            save();
        }

        function renderAchs() {
            const container = document.getElementById('ach-container');
            container.innerHTML = achievements.map(a => `
                <div id="ach-${a.id}" class="ach-item ${state.unlocked.includes(a.id)?'unlocked':''}" onclick="alert('${a.name}: ${a.desc}')">
                    <i class="fas ${a.icon}"></i>
                    <span>${a.name}</span>
                </div>
            `).join('');
        }

        function updateUI() {
            document.body.className = state.theme + '-theme';
            tg.setHeaderColor(state.theme === 'dark' ? '#000000' : '#f2f2f7');
            
            // Buttons highlight
            document.querySelectorAll('.s-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('lang-' + state.lang).classList.add('active');
            document.getElementById('theme-' + state.theme).classList.add('active');

            // Translation logic
            const isUk = state.lang === 'uk';
            document.getElementById('n-prof').innerText = isUk ? "Профіль" : "Profile";
            document.getElementById('n-ach').innerText = isUk ? "Успіхи" : "Awards";
            document.getElementById('n-top').innerText = isUk ? "Топ" : "Leaderboard";
            document.getElementById('txt-settings').innerText = isUk ? "Налаштування" : "Settings";
            document.getElementById('txt-ach-title').innerText = isUk ? "🏆 Досягнення" : "🏆 Achievements";
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            tg.HapticFeedback.selectionChanged();
        }

        function setLang(l) { state.lang = l; unlock(2); updateUI(); save(); }
        function setTheme(t) { state.theme = t; if(t==='light') unlock(4); updateUI(); save(); }

        function unlock(id) {
            if(!state.unlocked.includes(id)) {
                state.unlocked.push(id);
                renderAchs();
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        function devAction(type) {
            const nick = document.getElementById('dev-nick-xp').value || document.getElementById('dev-nick-ban').value;
            if(!nick) return alert("Введіть нікнейм!");
            
            tg.HapticFeedback.impactOccurred('heavy');
            alert(`Дія: ${type} для ${nick} виконана успішно (Demo)`);
        }

        init();
    </script>
</body>
</html>
