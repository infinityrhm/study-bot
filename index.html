<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study UA Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0c0c0e; --card: #1c1c1e; --accent: #34c759; --text: #ffffff; 
            --subtext: #8e8e93; --nav-bg: rgba(28, 28, 30, 0.95);
        }
        body.light-theme {
            --bg: #f2f2f7; --card: #ffffff; --text: #000000; 
            --subtext: #636366; --nav-bg: rgba(240, 240, 245, 0.95);
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, sans-serif; margin: 0; padding: 0; transition: 0.3s;
        }

        /* Навігація - ВИПРАВЛЕНО КОЛІР */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--nav-bg); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 12px 0 35px; 
            border-top: 1px solid rgba(142, 142, 147, 0.2); z-index: 1000;
        }
        .nav-item { color: var(--subtext); text-decoration: none; text-align: center; font-size: 11px; flex: 1; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; margin-bottom: 4px; }

        .page { display: none; padding: 20px; padding-bottom: 120px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Профіль */
        .profile-card { text-align: center; margin-bottom: 20px; }
        .u-avatar { 
            width: 90px; height: 90px; border-radius: 50%; background: var(--accent);
            margin: 0 auto 10px; display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: bold; color: white; border: 4px solid var(--accent);
            overflow: hidden;
        }
        .u-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .u-badge { background: var(--accent); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; margin-top: 5px; }

        .glass-card {
            background: var(--card); border-radius: 22px; padding: 18px;
            margin-bottom: 15px; border: 1px solid rgba(142, 142, 147, 0.1);
        }

        /* XP Бар */
        .xp-box { margin-top: 10px; }
        .xp-line { width: 100%; height: 10px; background: rgba(142,142,147,0.2); border-radius: 10px; overflow: hidden; }
        .xp-fill { width: 35%; height: 100%; background: var(--accent); transition: 0.5s; }

        /* Досягнення - СІРІ */
        .ach-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .ach-card { 
            background: var(--card); padding: 15px 5px; border-radius: 15px; text-align: center;
            filter: grayscale(1); opacity: 0.4; border: 1px solid rgba(142,142,147,0.1); transition: 0.3s;
        }
        .ach-card.unlocked { filter: grayscale(0); opacity: 1; border-color: var(--accent); }
        .ach-card i { font-size: 24px; color: #FFD700; }
        .ach-card span { display: block; font-size: 10px; margin-top: 5px; }

        /* Кнопки налаштувань */
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .s-btn { 
            flex: 1; padding: 12px; border-radius: 12px; border: none; 
            background: rgba(142, 142, 147, 0.1); color: var(--text); cursor: pointer;
        }
        .s-btn.active { background: var(--accent) !important; color: white !important; font-weight: bold; }

        /* Спливаюча підказка */
        #hint { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 10px 20px; border-radius: 30px;
            font-size: 13px; display: none; z-index: 2000; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="dark-theme">

    <div id="hint">Підказка</div>

    <div id="p-main" class="page active">
        <div class="profile-card">
            <div id="user-pic" class="u-avatar">?</div>
            <h2 id="user-name" style="margin:5px 0;">Вітаємо!</h2>
            <div id="user-nick" style="color:var(--accent); font-size: 14px; font-weight: bold;">@loading</div>
            <div id="user-rank" class="u-badge">Ранг: Учень</div>
        </div>

        <div class="glass-card">
            <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold; margin-bottom:5px;">
                <span id="txt-lvl">Рівень 3</span>
                <span>350 / 1000 XP</span>
            </div>
            <div class="xp-line"><div class="xp-fill"></div></div>
        </div>

        <div class="glass-card">
            <h3 id="txt-news"><i class="fas fa-bullhorn"></i> Новини</h3>
            <p style="color:var(--subtext); font-size: 14px;">Додаток успішно оновлено! Додано систему досягнень.</p>
        </div>
    </div>

    <div id="p-ach" class="page">
        <h2 id="tit-ach">Досягнення</h2>
        <div class="ach-grid">
            <div class="ach-card unlocked" onclick="tip('Ти відкрив додаток! Молодець!')">
                <i class="fas fa-check-circle"></i><span id="a1">Перший крок</span>
            </div>
            <div class="ach-card" onclick="tip('Отримай оцінку 12 у Classroom')">
                <i class="fas fa-star"></i><span id="a2">Відмінник</span>
            </div>
            <div class="ach-card" onclick="tip('Набери 1000 очок у Змійці')">
                <i class="fas fa-snake"></i><span id="a3">Змієлов</span>
            </div>
            <div class="ach-card" onclick="tip('Зміни мову 5 разів за хвилину')">
                <i class="fas fa-language"></i><span id="a4">Поліглот</span>
            </div>
            <div class="ach-card" onclick="tip('Заходь у додаток 7 днів поспіль')">
                <i class="fas fa-fire"></i><span id="a5">У вогні</span>
            </div>
            <div class="ach-card" onclick="tip('Виконай 10 домашніх завдань')">
                <i class="fas fa-book"></i><span id="a6">Ботанік</span>
            </div>
        </div>
    </div>

    <div id="p-set" class="page">
        <h2 id="tit-set">Налаштування</h2>
        <div class="glass-card">
            <h4 id="lab-lang">Мова</h4>
            <div class="btn-group">
                <button id="l-uk" class="s-btn active" onclick="setL('uk')">UA</button>
                <button id="l-ru" class="s-btn" onclick="setL('ru')">RU</button>
                <button id="l-en" class="s-btn" onclick="setL('en')">EN</button>
            </div>
        </div>
        <div class="glass-card">
            <h4 id="lab-theme">Тема</h4>
            <div class="btn-group">
                <button id="t-dark" class="s-btn active" onclick="setT('dark')">Dark</button>
                <button id="t-light" class="s-btn" onclick="setT('light')">Light</button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active" onclick="nav('p-main', this)"><i class="fas fa-user"></i><br><span id="n1">Профіль</span></a>
        <a href="#" class="nav-item" onclick="nav('p-ach', this)"><i class="fas fa-trophy"></i><br><span id="n2">Успіхи</span></a>
        <a href="#" class="nav-item" onclick="nav('p-set', this)"><i class="fas fa-cog"></i><br><span id="n3">Опції</span></a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. ПІДТЯГУЄМО ДАНІ ТЕЛЕГРАМ
        function loadTg() {
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                const u = tg.initDataUnsafe.user;
                document.getElementById('user-name').innerText = u.first_name || "Користувач";
                document.getElementById('user-nick').innerText = u.username ? "@" + u.username : "";
                
                const box = document.getElementById('user-pic');
                if (u.photo_url) {
                    box.innerHTML = `<img src="${u.photo_url}">`;
                } else {
                    box.innerText = u.first_name ? u.first_name[0] : "?";
                }
            }
        }
        loadTg();

        // 2. НАВІГАЦІЯ
        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        // 3. МОВА
        const langData = {
            uk: { n1:"Профіль", n2:"Успіхи", n3:"Опції", lvl:"Рівень 3", rank:"Ранг: Учень", news:"Новини", set:"Налаштування", lang:"Мова", theme:"Тема" },
            ru: { n1:"Профиль", n2:"Успехи", n3:"Опции", lvl:"Уровень 3", rank:"Ранг: Ученик", news:"Новости", set:"Настройки", lang:"Язык", theme:"Тема" },
            en: { n1:"Profile", n2:"Trophies", n3:"Options", lvl:"Level 3", rank:"Rank: Student", news:"News", set:"Settings", lang:"Language", theme:"Theme" }
        };

        function setL(l) {
            const d = langData[l];
            document.getElementById('n1').innerText = d.n1;
            document.getElementById('n2').innerText = d.n2;
            document.getElementById('n3').innerText = d.n3;
            document.getElementById('txt-lvl').innerText = d.lvl;
            document.getElementById('user-rank').innerText = d.rank;
            document.getElementById('txt-news').innerHTML = `<i class="fas fa-bullhorn"></i> ${d.news}`;
            document.getElementById('tit-set').innerText = d.set;
            document.getElementById('lab-lang').innerText = d.lang;
            document.getElementById('lab-theme').innerText = d.theme;

            document.querySelectorAll('[id^="l-"]').forEach(b => b.classList.remove('active'));
            document.getElementById('l-' + l).classList.add('active');
        }

        // 4. ТЕМА
        function setT(t) {
            document.body.className = t + '-theme';
            document.querySelectorAll('[id^="t-"]').forEach(b => b.classList.remove('active'));
            document.getElementById('t-' + t).classList.add('active');
            tg.setHeaderColor(t === 'dark' ? '#0c0c0e' : '#f2f2f7');
        }

        // 5. ПІДКАЗКИ
        function tip(txt) {
            const h = document.getElementById('hint');
            h.innerText = txt;
            h.style.display = 'block';
            setTimeout(() => h.style.display = 'none', 2500);
        }
    </script>
</body>
</html>
