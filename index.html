<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Study UA: Absolute Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --accent: #34c759;
            --accent-soft: rgba(52, 199, 89, 0.1);
            --text: #ffffff;
            --sub: #8e8e93;
            --border: rgba(255, 255, 255, 0.08);
            --nav-bg: rgba(18, 18, 18, 0.94);
        }

        body.light-theme {
            --bg: #f2f2f7;
            --card: #ffffff;
            --text: #000000;
            --sub: #636366;
            --border: rgba(0, 0, 0, 0.05);
            --nav-bg: rgba(255, 255, 255, 0.94);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            overflow: hidden;
            transition: background 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Layout */
        .app-container { height: 100vh; display: flex; flex-direction: column; }
        .content { flex: 1; overflow-y: auto; padding: 20px 16px 140px; scrollbar-width: none; }
        .content::-webkit-scrollbar { display: none; }

        .page { display: none; animation: pageIn 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .page.active { display: block; }
        @keyframes pageIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards & UI */
        .nz-card {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .u-avatar {
            width: 110px; height: 110px; border-radius: 50%;
            margin: 0 auto 16px; position: relative;
            background: var(--accent); display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: white; border: 4px solid var(--card);
            box-shadow: 0 0 0 3px var(--accent); overflow: hidden;
        }
        .u-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .s-btn {
            flex: 1; padding: 16px; border-radius: 16px; border: none;
            background: var(--border); color: var(--text);
            font-weight: 700; font-size: 14px; transition: all 0.2s; cursor: pointer;
        }
        .s-btn.active { background: var(--accent) !important; color: white !important; transform: scale(0.98); }

        /* XP & Levels */
        .progress-container { margin: 20px 0; }
        .progress-bar { width: 100%; height: 12px; background: var(--border); border-radius: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #34c759, #32ade6); width: 0%; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* Subjects Grid */
        .sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .sub-item { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; }
        .sub-score { font-size: 24px; font-weight: 900; color: var(--accent); margin: 5px 0; }
        .sub-name { font-size: 12px; color: var(--sub); font-weight: 600; text-transform: uppercase; }

        /* Leaderboard */
        .leader-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); }
        .rank-num { width: 30px; font-weight: 900; font-size: 18px; color: var(--sub); }
        .rank-1 { color: #FFD700; } .rank-2 { color: #C0C0C0; } .rank-3 { color: #CD7F32; }
        .lead-avatar { width: 45px; height: 45px; border-radius: 50%; margin: 0 12px; background: var(--border); overflow: hidden; }
        .lead-info { flex: 1; }
        .lead-name { font-weight: 700; font-size: 15px; }
        .lead-xp { font-weight: 800; color: var(--accent); font-size: 14px; }

        /* Nav Bar */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 95px;
            background: var(--nav-bg); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding-bottom: 30px;
            border-top: 1px solid var(--border); z-index: 1000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--sub); text-decoration: none; font-size: 10px; font-weight: 600; transition: 0.3s;
        }
        .nav-item.active { color: var(--accent); transform: translateY(-5px); }
        .nav-item i { font-size: 24px; margin-bottom: 4px; }

        /* Dev UI Custom */
        .dev-badge { background: linear-gradient(45deg, #FF3B30, #FF9500); color: white; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 900; display: inline-block; margin-top: 5px; }
        .input-dark { width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: white; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="content">

            <div id="page-profile" class="page active">
                <div style="text-align: center; margin-bottom: 30px;">
                    <div id="user-avatar" class="u-avatar">?</div>
                    <h2 id="user-full-name" style="margin: 0; font-size: 26px;">Студент</h2>
                    <div id="dev-tag-container"></div>
                </div>

                <div class="nz-card">
                    <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                        <div>
                            <span id="label-lvl" style="font-size: 12px; color: var(--sub); font-weight: 800; text-transform: uppercase;">Рівень</span>
                            <div id="display-lvl" style="font-size: 32px; font-weight: 900; line-height: 1;">1</div>
                        </div>
                        <div id="display-xp" style="font-weight: 700; color: var(--sub);">0 / 1000 XP</div>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar"><div id="xp-fill" class="progress-fill"></div></div>
                    </div>
                </div>

                <div class="nz-card">
                    <h3 id="label-settings" style="margin-top:0">Налаштування</h3>
                    <p style="font-size: 13px; color: var(--sub);" id="label-lang">Мова додатка</p>
                    <div class="btn-group">
                        <button id="lang-uk" class="s-btn" onclick="app.setLang('uk')">Українська</button>
                        <button id="lang-en" class="s-btn" onclick="app.setLang('en')">English</button>
                    </div>
                    <p style="font-size: 13px; color: var(--sub); margin-top: 20px;" id="label-theme">Тема оформлення</p>
                    <div class="btn-group">
                        <button id="theme-dark" class="s-btn" onclick="app.setTheme('dark')">Темна</button>
                        <button id="theme-light" class="s-btn" onclick="app.setTheme('light')">Світла</button>
                    </div>
                </div>
            </div>

            <div id="page-diary" class="page">
                <h2 id="label-diary">Щоденник</h2>
                <div class="sub-grid" id="diary-container">
                    </div>
                <div class="nz-card" style="margin-top: 20px;">
                    <button class="s-btn active" onclick="app.addGrade()">Додати оцінку (Тест)</button>
                </div>
            </div>

            <div id="page-top" class="page">
                <h2 id="label-top">Рейтинг учнів</h2>
                <div class="nz-card" style="padding: 0;">
                    <div id="leaderboard-list">
                        </div>
                </div>
            </div>

            <div id="page-dev" class="page">
                <h2 style="color: #FF3B30;"><i class="fas fa-shield-halved"></i> Admin Console</h2>
                
                <div class="nz-card">
                    <h4 style="margin-top:0">Керування XP</h4>
                    <input type="number" id="dev-xp-input" class="input-dark" placeholder="Кількість XP">
                    <div class="btn-group">
                        <button class="s-btn active" onclick="app.devAddXP()">Додати</button>
                        <button class="s-btn" onclick="app.devResetXP()" style="background: #FF3B30">Скинути</button>
                    </div>
                </div>

                <div class="nz-card">
                    <h4>Система</h4>
                    <button class="s-btn" onclick="app.devToggleMaint()" id="btn-maint">Тех. роботи: OFF</button>
                    <button class="s-btn" onclick="app.devWipe()" style="margin-top:10px; color: #FF3B30">Повне видалення бази</button>
                </div>
            </div>

        </div>

        <nav class="nav-bar">
            <a href="javascript:void(0)" class="nav-item active" onclick="app.nav('page-profile', this)">
                <i class="fas fa-user-circle"></i><span class="nav-label" id="n-prof">Профіль</span>
            </a>
            <a href="javascript:void(0)" class="nav-item" onclick="app.nav('page-diary', this)">
                <i class="fas fa-book-open"></i><span class="nav-label" id="n-diary">Оцінки</span>
            </a>
            <a href="javascript:void(0)" class="nav-item" onclick="app.nav('page-top', this)">
                <i class="fas fa-trophy"></i><span class="nav-label" id="n-top">Топ</span>
            </a>
            <a href="javascript:void(0)" id="nav-dev-item" class="nav-item" style="display:none" onclick="app.nav('page-dev', this)">
                <i class="fas fa-code"></i><span>Dev</span>
            </a>
        </nav>
    </div>

    <script>
        const app = {
            tg: window.Telegram.WebApp,
            state: {
                lang: 'uk',
                theme: 'dark',
                xp: 0,
                lvl: 1,
                grades: [
                    { name: 'Математика', score: 11 },
                    { name: 'Укр. Мова', score: 10 },
                    { name: 'Історія', score: 12 },
                    { name: 'Фізика', score: 9 }
                ],
                maint: false
            },

            locales: {
                uk: {
                    n_prof: 'Профіль', n_diary: 'Оцінки', n_top: 'Топ',
                    settings: 'Налаштування', lang: 'Мова додатка', theme: 'Тема оформлення',
                    diary: 'Щоденник', top: 'Рейтинг учнів', level: 'Рівень'
                },
                en: {
                    n_prof: 'Profile', n_diary: 'Grades', n_top: 'Leaderboard',
                    settings: 'Settings', lang: 'App Language', theme: 'App Theme',
                    diary: 'Diary', top: 'Global Ranking', level: 'Level'
                }
            },

            init() {
                this.tg.expand();
                this.tg.ready();
                
                // Load data
                const saved = localStorage.getItem('study_ultimate_db');
                if(saved) this.state = {...this.state, ...JSON.parse(saved)};

                // Telegram User
                if(this.tg.initDataUnsafe?.user) {
                    const u = this.tg.initDataUnsafe.user;
                    document.getElementById('user-full-name').innerText = u.first_name + (u.last_name ? ' ' + u.last_name : '');
                    
                    // Avatar logic
                    const avContainer = document.getElementById('user-avatar');
                    if(u.photo_url) {
                        avContainer.innerHTML = `<img src="${u.photo_url}" alt="avatar">`;
                    } else {
                        avContainer.innerText = u.first_name[0];
                    }

                    // Admin ID Check
                    if(u.id === 6439834001) {
                        document.getElementById('nav-dev-item').style.display = 'flex';
                        document.getElementById('dev-tag-container').innerHTML = '<span class="dev-badge">DEVELOPER ACCESS</span>';
                    }
                }

                this.updateUI();
                this.renderDiary();
                this.renderTop();
            },

            updateUI() {
                const tr = this.locales[this.state.lang];
                // Text updates
                document.getElementById('n-prof').innerText = tr.n_prof;
                document.getElementById('n-diary').innerText = tr.n_diary;
                document.getElementById('n-top').innerText = tr.n_top;
                document.getElementById('label-settings').innerText = tr.settings;
                document.getElementById('label-lang').innerText = tr.lang;
                document.getElementById('label-theme').innerText = tr.theme;
                document.getElementById('label-diary').innerText = tr.diary;
                document.getElementById('label-top').innerText = tr.top;
                document.getElementById('label-lvl').innerText = tr.level;

                // Stats
                document.getElementById('display-lvl').innerText = this.state.lvl;
                document.getElementById('display-xp').innerText = `${this.state.xp} / 1000 XP`;
                document.getElementById('xp-fill').style.width = (this.state.xp / 10) + '%';

                // Theme
                document.body.className = this.state.theme + '-theme';
                this.tg.setHeaderColor(this.state.theme === 'dark' ? '#000000' : '#f2f2f7');

                // Buttons
                document.querySelectorAll('.s-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById('lang-' + this.state.lang).classList.add('active');
                document.getElementById('theme-' + this.state.theme).classList.add('active');

                this.save();
            },

            nav(pageId, el) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(pageId).classList.add('active');
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
                this.tg.HapticFeedback.selectionChanged();
            },

            setLang(l) { this.state.lang = l; this.updateUI(); },
            setTheme(t) { this.state.theme = t; this.updateUI(); },

            renderDiary() {
                const container = document.getElementById('diary-container');
                container.innerHTML = this.state.grades.map(g => `
                    <div class="sub-item">
                        <span class="sub-name">${g.name}</span>
                        <span class="sub-score">${g.score}</span>
                        <span style="font-size:10px; color:var(--accent)">Задовільно</span>
                    </div>
                `).join('');
            },

            addGrade() {
                const scores = [10, 11, 12];
                const rand = scores[Math.floor(Math.random() * scores.length)];
                this.state.grades.push({name: 'Новий тест', score: rand});
                this.state.xp += 50;
                if(this.state.xp >= 1000) { this.state.xp = 0; this.state.lvl++; }
                this.renderDiary();
                this.updateUI();
                this.tg.HapticFeedback.notificationOccurred('success');
            },

            renderTop() {
                const list = document.getElementById('leaderboard-list');
                const users = [
                    {name: 'Developer', xp: '999k', lvl: 99, me: true},
                    {name: 'Олександр В.', xp: '12,400', lvl: 15, me: false},
                    {name: 'Марина П.', xp: '8,100', lvl: 9, me: false},
                    {name: 'Дмитро К.', xp: '5,000', lvl: 6, me: false}
                ];

                list.innerHTML = users.map((u, i) => `
                    <div class="leader-row">
                        <div class="rank-num rank-${i+1}">${i+1}</div>
                        <div class="lead-avatar">${u.me && this.tg.initDataUnsafe.user?.photo_url ? '<img src="'+this.tg.initDataUnsafe.user.photo_url+'">' : u.name[0]}</div>
                        <div class="lead-info">
                            <div class="lead-name">${u.me ? (this.tg.initDataUnsafe.user?.first_name || u.name) + ' (Ви)' : u.name}</div>
                            <div style="font-size:11px; color:var(--sub)">Рівень ${u.lvl}</div>
                        </div>
                        <div class="lead-xp">${u.xp} XP</div>
                    </div>
                `).join('');
            },

            // Dev Methods
            devAddXP() {
                const val = parseInt(document.getElementById('dev-xp-input').value);
                if(val) {
                    this.state.xp += val;
                    while(this.state.xp >= 1000) { this.state.xp -= 1000; this.state.lvl++; }
                    this.updateUI();
                    this.tg.HapticFeedback.impactOccurred('heavy');
                }
            },
            devResetXP() { this.state.xp = 0; this.state.lvl = 1; this.updateUI(); },
            devWipe() { localStorage.clear(); location.reload(); },
            devToggleMaint() {
                this.state.maint = !this.state.maint;
                document.getElementById('btn-maint').innerText = 'Тех. роботи: ' + (this.state.maint ? 'ON' : 'OFF');
                alert('Статус змінено. На реальному сервері додаток закрився б.');
            },

            save() { localStorage.setItem('study_ultimate_db', JSON.stringify(this.state)); }
        };

        app.init();
    </script>
</body>
</html>
