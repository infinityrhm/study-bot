<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZ UA Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #000; --card: #121212; --accent: #34c759; --text: #fff; --sub: #8e8e93; --nav: rgba(18,18,18,0.98); }
        body.light-theme { --bg: #f2f2f7; --card: #fff; --text: #000; --sub: #636366; --nav: rgba(245,245,250,0.98); }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; transition: 0.3s; overflow: hidden; }

        .page { display: none; padding: 15px 15px 140px; height: 100vh; overflow-y: auto; box-sizing: border-box; animation: slideUp 0.3s ease; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .nz-card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(142,142,147,0.1); }
        .s-btn { width: 100%; padding: 14px; border-radius: 14px; border: none; background: rgba(142,142,147,0.1); color: var(--text); font-weight: 700; cursor: pointer; margin-bottom: 8px; font-size: 14px; }
        .s-btn.active { background: var(--accent) !important; color: #fff !important; }

        /* Avatar System */
        .u-avatar-large { width: 90px; height: 90px; border-radius: 50%; background: var(--accent); margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 35px; color: #fff; border: 3px solid var(--accent); overflow: hidden; }
        .u-avatar-large img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        /* Progress */
        .xp-bar { width: 100%; height: 10px; background: rgba(142,142,147,0.2); border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .xp-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.6s ease; }

        /* List Items (Top & Friends) */
        .list-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(142,142,147,0.05); }
        .list-avatar { width: 42px; height: 42px; border-radius: 50%; background: #333; margin-right: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .list-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .list-content { flex: 1; }
        .list-title { font-weight: bold; font-size: 15px; }
        .list-subtitle { font-size: 12px; color: var(--sub); }

        /* Dev UI */
        .dev-badge { background: linear-gradient(45deg, #ff3b30, #ff9500); color: #fff; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; }
        .dev-input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; }
        .dev-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--nav); display: flex; padding: 12px 0 35px; border-top: 1px solid rgba(142,142,147,0.1); z-index: 1000; backdrop-filter: blur(20px); }
        .nav-item { flex: 1; text-align: center; color: var(--sub); text-decoration: none; font-size: 11px; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

    <div id="maint-screen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px;">
        <i class="fas fa-tools" style="font-size:50px; color:var(--accent); margin-bottom:20px;"></i>
        <h2>Технічні роботи</h2>
        <p style="color:var(--sub);">Ми оновлюємо систему. Спробуйте пізніше.</p>
    </div>

    <div id="p-profile" class="page active">
        <div style="text-align:center; margin-bottom: 25px;">
            <div id="my-avatar" class="u-avatar-large">?</div>
            <h2 id="my-name" style="margin:0;">User</h2>
            <div id="my-rank" style="margin-top:5px;"><span style="color:var(--sub); font-size:13px;">Учень NZ UA</span></div>
        </div>

        <div class="nz-card">
            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:13px;">
                <span id="txt-lvl">Рівень 1</span>
                <span id="my-xp-text">0 / 1000 XP</span>
            </div>
            <div class="xp-bar"><div id="my-xp-fill" class="xp-fill"></div></div>
        </div>

        <div class="nz-card">
            <h4 id="txt-lang">Мова</h4>
            <div class="btn-group" style="display:flex; gap:8px;">
                <button id="l-uk" class="s-btn" onclick="setL('uk')">Українська</button>
                <button id="l-en" class="s-btn" onclick="setL('en')">English</button>
            </div>
            <h4 id="txt-theme" style="margin-top:15px;">Тема</h4>
            <div class="btn-group" style="display:flex; gap:8px;">
                <button id="t-dark" class="s-btn" onclick="setT('dark')">Темна</button>
                <button id="t-light" class="s-btn" onclick="setT('light')">Світла</button>
            </div>
        </div>
    </div>

    <div id="p-top" class="page">
        <h3 id="txt-top">🏆 Рейтинг</h3>
        <div class="nz-card" id="top-container">
            </div>
    </div>

    <div id="p-friends" class="page">
        <h3 id="txt-friends">👥 Друзі</h3>
        <div class="nz-card">
            <input type="text" id="add-fr-input" class="dev-input" placeholder="Нікнейм...">
            <button class="s-btn active" onclick="addFriend()">Додати друга</button>
        </div>
        <div id="friends-container"></div>
    </div>

    <div id="p-dev" class="page">
        <h3 style="color:#ff3b30"><i class="fas fa-user-shield"></i> Developer Panel</h3>
        
        <div class="nz-card">
            <div class="dev-grid">
                <button class="s-btn" onclick="devCmd('XP')">+100 XP</button>
                <button class="s-btn" onclick="devCmd('LVL')">+1 Level</button>
            </div>
            <button class="s-btn active" style="margin-top:10px;" onclick="devCmd('MAINT')">Тех. роботи (On/Off)</button>
        </div>

        <div class="nz-card">
            <strong>📢 Системне сповіщення</strong>
            <input type="text" id="dev-msg" class="dev-input" placeholder="Текст повідомлення...">
            <button class="s-btn active" onclick="devCmd('MSG')">Надіслати всім</button>
        </div>

        <div class="nz-card">
            <strong>🚫 Керування користувачем</strong>
            <input type="text" id="dev-target" class="dev-input" placeholder="@username">
            <button class="s-btn" style="background:rgba(255,59,48,0.1); color:#ff3b30;" onclick="devCmd('BAN')">Заблокувати</button>
            <button class="s-btn" onclick="devCmd('RESET')">Очистити дані</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active" onclick="nav('p-profile', this)"><i class="fas fa-user-circle"></i><span id="n1">Профіль</span></a>
        <a href="#" class="nav-item" onclick="nav('p-top', this)"><i class="fas fa-crown"></i><span id="n2">Топ</span></a>
        <a href="#" class="nav-item" onclick="nav('p-friends', this)"><i class="fas fa-users"></i><span id="n3">Друзі</span></a>
        <a href="#" id="nav-dev" class="nav-item" style="display:none;" onclick="nav('p-dev', this)"><i class="fas fa-terminal"></i>Dev</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let state = JSON.parse(localStorage.getItem('nz_premium_v8')) || {
            lang: 'uk', theme: 'dark', xp: 0, lvl: 1, friends: [], maint: false
        };

        const texts = {
            uk: { n1:"Профіль", n2:"Топ", n3:"Друзі", l:"Мова", t:"Тема", lvl:"Рівень", top:"🏆 Рейтинг", fr:"👥 Друзі" },
            en: { n1:"Profile", n2:"Top", n3:"Friends", l:"Language", t:"Theme", lvl:"Level", top:"🏆 Leaderboard", fr:"👥 Friends" }
        };

        function save() { localStorage.setItem('nz_premium_v8', JSON.stringify(state)); updateUI(); }

        function init() {
            if (tg.initDataUnsafe?.user) {
                const u = tg.initDataUnsafe.user;
                document.getElementById('my-name').innerText = u.first_name;
                
                // РЕАЛЬНА АВАТАРКА
                const avatarDiv = document.getElementById('my-avatar');
                if (u.photo_url) {
                    avatarDiv.innerHTML = `<img src="${u.photo_url}" onerror="this.src='https://ui-avatars.com/api/?name=${u.first_name}&background=34c759&color=fff'">`;
                } else {
                    avatarDiv.innerText = u.first_name[0];
                }

                if (u.id === 6439834001) {
                    document.getElementById('nav-dev').style.display = 'block';
                    document.getElementById('my-rank').innerHTML = '<span class="dev-badge">DEVELOPER</span>';
                }
            }
            updateUI();
            renderTop();
        }

        function updateUI() {
            const t = texts[state.lang];
            document.getElementById('n1').innerText = t.n1; document.getElementById('n2').innerText = t.n2;
            document.getElementById('n3').innerText = t.n3; document.getElementById('txt-lang').innerText = t.l;
            document.getElementById('txt-theme').innerText = t.t; document.getElementById('txt-lvl').innerText = `${t.lvl} ${state.lvl}`;
            document.getElementById('txt-top').innerText = t.top; document.getElementById('txt-friends').innerText = t.fr;

            document.getElementById('my-xp-text').innerText = `${state.xp} / 1000 XP`;
            document.getElementById('my-xp-fill').style.width = (state.xp / 10) + '%';

            document.body.className = state.theme + '-theme';
            tg.setHeaderColor(state.theme === 'dark' ? '#000000' : '#f2f2f7');

            document.querySelectorAll('.s-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('l-' + state.lang).classList.add('active');
            document.getElementById('t-' + state.theme).classList.add('active');

            document.getElementById('maint-screen').style.display = state.maint ? 'flex' : 'none';
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            tg.HapticFeedback.selectionChanged();
        }

        function setL(l) { state.lang = l; save(); }
        function setT(t) { state.theme = t; save(); }

        function renderTop() {
            const container = document.getElementById('top-container');
            const u = tg.initDataUnsafe?.user;
            const myName = u ? u.first_name : "Ви";
            const myImg = u?.photo_url ? `<img src="${u.photo_url}">` : myName[0];

            // Імітація ТОПу
            container.innerHTML = `
                <div class="list-row">
                    <div class="list-avatar" style="border:2px solid gold;">${myImg}</div>
                    <div class="list-content"><div class="list-title">${myName} (Ви)</div><div class="list-subtitle">Online</div></div>
                    <div style="font-weight:bold; color:var(--accent);">${state.lvl} LVL</div>
                </div>
                <div class="list-row">
                    <div class="list-avatar">S</div>
                    <div class="list-content"><div class="list-title">Student_UA</div><div class="list-subtitle">2 хв. тому</div></div>
                    <div style="font-weight:bold; color:var(--sub);">12 LVL</div>
                </div>
            `;
        }

        function addFriend() {
            const nick = document.getElementById('add-fr-input').value;
            if(!nick) return;
            const container = document.getElementById('friends-container');
            const row = document.createElement('div');
            row.className = 'nz-card list-row';
            row.innerHTML = `<div class="list-avatar">${nick[0]}</div><div class="list-content"><div class="list-title">${nick}</div><div class="list-subtitle">Запит надіслано</div></div>`;
            container.prepend(row);
            document.getElementById('add-fr-input').value = '';
            tg.HapticFeedback.notificationOccurred('success');
        }

        function devCmd(cmd) {
            tg.HapticFeedback.impactOccurred('medium');
            if(cmd === 'XP') { state.xp += 100; if(state.xp >= 1000) { state.xp=0; state.lvl++; } }
            if(cmd === 'LVL') state.lvl++;
            if(cmd === 'MAINT') state.maint = !state.maint;
            if(cmd === 'RESET') { localStorage.clear(); location.reload(); return; }
            if(cmd === 'MSG') alert("Сповіщення надіслано: " + document.getElementById('dev-msg').value);
            save();
            renderTop();
        }

        init();
    </script>
</body>
</html>
