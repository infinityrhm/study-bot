<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study UA Dev Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --card: #121212; --accent: #34c759; --text: #fff; --sub: #8e8e93; --nav: rgba(18,18,18,0.98); }
        body.light-theme { --bg: #f2f2f7; --card: #fff; --text: #000; --sub: #636366; --nav: rgba(245,245,250,0.98); }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; transition: 0.3s; overflow-x: hidden; }

        .page { display: none; padding: 15px 15px 120px; animation: fadeIn 0.2s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .nz-card { background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(142,142,147,0.1); }
        
        /* Кнопки та інпути */
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .s-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; background: rgba(142,142,147,0.1); color: var(--text); font-weight: 700; cursor: pointer; transition: 0.2s; }
        .s-btn.active { background: var(--accent) !important; color: #fff !important; }
        
        .dev-input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(142,142,147,0.2); color: var(--text); border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }

        /* Досягнення */
        .ach-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .ach-item { background: var(--card); padding: 15px 5px; border-radius: 16px; text-align: center; filter: grayscale(1); opacity: 0.3; transition: 0.5s; }
        .ach-item.unlocked { filter: grayscale(0); opacity: 1; border: 1px solid var(--accent); transform: translateY(-3px); }
        .ach-item i { font-size: 24px; color: #ffd700; margin-bottom: 5px; display: block; }
        .ach-item span { font-size: 10px; font-weight: bold; }

        /* Сповіщення */
        .notif-badge { position: absolute; top: 5px; right: 25%; background: #ff3b30; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: bold; display: none; }
        .notif-item { padding: 12px; border-bottom: 1px solid rgba(142,142,147,0.1); display: flex; align-items: center; gap: 12px; }

        /* Навігація */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--nav); display: flex; padding: 12px 0 35px; border-top: 1px solid rgba(142,142,147,0.1); z-index: 1000; backdrop-filter: blur(10px); }
        .nav-item { flex: 1; text-align: center; color: var(--sub); text-decoration: none; font-size: 11px; position: relative; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; margin-bottom: 4px; display: block; }

        .rank-dev { background: linear-gradient(45deg, #ff3b30, #ff9500); color: #fff; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="p-profile" class="page active">
        <div style="text-align:center; margin-bottom: 30px;">
            <div id="u-pic" style="width:90px; height:90px; border-radius:50%; background:var(--accent); margin:0 auto 12px; display:flex; align-items:center; justify-content:center; font-size:32px; color:#fff; border:3px solid var(--accent);">?</div>
            <h3 id="u-name" style="margin:0;">Користувач</h3>
            <div id="u-rank-tag" style="margin-top:8px;"></div>
        </div>

        <div class="nz-card">
            <h4 id="lang-title">Мова</h4>
            <div class="btn-group">
                <button id="l-uk" class="s-btn" onclick="setL('uk')">UA</button>
                <button id="l-en" class="s-btn" onclick="setL('en')">EN</button>
            </div>
        </div>

        <div class="nz-card">
            <h4 id="theme-title">Тема</h4>
            <div class="btn-group">
                <button id="t-dark" class="s-btn" onclick="setT('dark')">Dark</button>
                <button id="t-light" class="s-btn" onclick="setT('light')">Light</button>
            </div>
        </div>
    </div>

    <div id="p-ach" class="page">
        <h3 id="ach-title">Досягнення</h3>
        <div class="ach-grid" id="ach-list"></div>
    </div>

    <div id="p-top" class="page">
        <h3 id="top-title">Топ лідерів</h3>
        <div class="nz-card" id="top-list">
            <div class="notif-item"><b>1.</b> <span style="margin-left:10px;">Розробник</span> <span style="margin-left:auto; color:var(--accent);">999k XP</span></div>
            <div class="notif-item"><b>2.</b> <span style="margin-left:10px;">Студент_1</span> <span style="margin-left:auto; color:var(--accent);">1500 XP</span></div>
        </div>
    </div>

    <div id="p-notif" class="page">
        <h3 id="notif-title">Сповіщення</h3>
        <div id="notif-container"></div>
    </div>

    <div id="p-dev" class="page">
        <h3 style="color:#ff3b30"><i class="fas fa-terminal"></i> Developer Panel</h3>
        <div class="nz-card">
            <strong>📊 Аналітика</strong>
            <p style="font-size:13px; color:var(--sub);">Сесій: <span id="st-log">0</span> | Online: <span id="st-on" style="color:var(--accent)">1</span></p>
        </div>

        <div class="nz-card">
            <strong>⚡ Нарахувати XP</strong>
            <input type="text" id="xp-nick" class="dev-input" placeholder="Нік (@username)">
            <input type="number" id="xp-num" class="dev-input" placeholder="Сума XP">
            <button class="s-btn active" onclick="devCmd('XP')">Видати XP</button>
        </div>

        <div class="nz-card">
            <strong>🚫 Security</strong>
            <input type="text" id="ban-nick" class="dev-input" placeholder="Нік для бану">
            <input type="text" id="ban-reason" class="dev-input" placeholder="Причина">
            <button class="s-btn" style="background:#ff3b30; color:#fff;" onclick="devCmd('BAN')">ЗАБЛОКУВАТИ</button>
            <button class="s-btn" style="margin-top:10px;" onclick="devCmd('RESET')">Скинути ачівки юзера</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active" onclick="nav('p-profile', this)"><i class="fas fa-user-circle"></i><span id="n1">Профіль</span></a>
        <a href="#" class="nav-item" onclick="nav('p-ach', this)"><i class="fas fa-trophy"></i><span id="n2">Успіхи</span></a>
        <a href="#" class="nav-item" onclick="nav('p-top', this)"><i class="fas fa-chart-line"></i><span id="n3">Топ</span></a>
        <a href="#" class="nav-item" onclick="nav('p-notif', this)"><span id="badge" class="notif-badge">0</span><i class="fas fa-bell"></i><span id="n4">Події</span></a>
        <a href="#" id="dev-nav" class="nav-item" style="display:none;" onclick="nav('p-dev', this)"><i class="fas fa-shield-alt"></i>Dev</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let data = JSON.parse(localStorage.getItem('study_v5')) || {
            lang: 'uk', theme: 'dark', unlocked: [1], logins: 0, notifications: []
        };

        const achs = [
            {id:1, name:"Вітаємо", d:"Перший вхід", i:"fa-hand-sparkles"},
            {id:2, name:"Поліглот", d:"Змінено мову", i:"fa-language"},
            {id:3, name:"Нічна сова", d:"Зайшли вночі", i:"fa-moon"},
            {id:4, name:"Дизайнер", d:"Світла тема", i:"fa-paint-brush"},
            {id:5, name:"Хакер", d:"Доступ до Dev", i:"fa-user-secret"},
            {id:6, name:"Магнат", d:"Отримано 1000 XP", i:"fa-gem"}
        ];

        const langData = {
            uk: { n1:"Профіль", n2:"Успіхи", n3:"Топ", n4:"Події", l:"Мова", t:"Тема", at:"🏆 Досягнення", tt:"📊 Топ лідерів", nt:"🔔 Сповіщення" },
            en: { n1:"Profile", n2:"Awards", n3:"Leaderboard", n4:"Events", l:"Language", t:"Theme", at:"🏆 Achievements", tt:"📊 Top Players", nt:"🔔 Notifications" }
        };

        function save() { localStorage.setItem('study_v5', JSON.stringify(data)); updateUI(); }

        function init() {
            data.logins++;
            if(tg.initDataUnsafe?.user) {
                const u = tg.initDataUnsafe.user;
                document.getElementById('u-name').innerText = u.first_name;
                if(u.id === 6439834001) {
                    data.isAdmin = true;
                    document.getElementById('dev-nav').style.display = 'block';
                    document.getElementById('u-rank-tag').innerHTML = '<span class="rank-dev">DEVELOPER</span>';
                    unlock(5);
                }
            }
            renderAchs();
            updateUI();
            addNotif("Ласкаво просимо до Study UA v5.0!");
        }

        function updateUI() {
            const l = langData[data.lang];
            document.getElementById('n1').innerText = l.n1; document.getElementById('n2').innerText = l.n2;
            document.getElementById('n3').innerText = l.n3; document.getElementById('n4').innerText = l.n4;
            document.getElementById('lang-title').innerText = l.l; document.getElementById('theme-title').innerText = l.t;
            document.getElementById('ach-title').innerText = l.at; document.getElementById('top-title').innerText = l.tt;
            document.getElementById('notif-title').innerText = l.nt;
            
            document.body.className = data.theme + '-theme';
            tg.setHeaderColor(data.theme === 'dark' ? '#000000' : '#f2f2f7');

            document.querySelectorAll('.s-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('l-' + data.lang).classList.add('active');
            document.getElementById('t-' + data.theme).classList.add('active');

            document.getElementById('st-log').innerText = data.logins;
            
            const badge = document.getElementById('badge');
            const unread = data.notifications.length;
            if(unread > 0) { badge.innerText = unread; badge.style.display = 'block'; }
            else { badge.style.display = 'none'; }
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'p-notif') { data.notifications = []; save(); }
            tg.HapticFeedback.selectionChanged();
        }

        function renderAchs() {
            document.getElementById('ach-list').innerHTML = achs.map(a => `
                <div id="ach-${a.id}" class="ach-item ${data.unlocked.includes(a.id)?'unlocked':''}" onclick="alert('${a.name}: ${a.d}')">
                    <i class="fas ${a.i}"></i><span>${a.name}</span>
                </div>
            `).join('');
        }

        function setL(l) { data.lang = l; unlock(2); save(); }
        function setT(t) { data.theme = t; if(t==='light') unlock(4); save(); }

        function unlock(id) {
            if(!data.unlocked.includes(id)) {
                data.unlocked.push(id);
                addNotif("🏆 Нове досягнення розблоковано!");
                renderAchs();
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        function addNotif(txt) {
            data.notifications.push(txt);
            const container = document.getElementById('notif-container');
            const item = document.createElement('div');
            item.className = 'notif-item';
            item.innerHTML = `<i>🔔</i> ${txt}`;
            container.prepend(item);
            save();
        }

        function devCmd(type) {
            const nick = document.getElementById('xp-nick').value || document.getElementById('ban-nick').value;
            if(!nick) return alert("Вкажіть нікнейм користувача!");
            tg.HapticFeedback.impactOccurred('heavy');
            alert(`Команда ${type} для ${nick} успішно відправлена в чергу (Simulation)`);
        }

        init();
    </script>
</body>
</html>
