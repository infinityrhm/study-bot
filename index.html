<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #000;
            --card: #1c1c1e;
            --accent: #34c759;
            --text: #fff;
            --secondary: #8e8e93;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .page { display: none; padding: 15px; padding-bottom: 100px; }
        .page.active { display: block; }

        /* Шапка */
        .user-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .user-avatar {
            width: 45px; height: 45px;
            background: var(--accent);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold;
        }

        /* Кнопки и Карточки */
        .card {
            background: var(--card);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 15px;
        }

        /* Список игр */
        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .game-card {
            background: var(--card);
            padding: 20px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid #333;
        }
        .game-card i { font-size: 30px; color: var(--accent); margin-bottom: 10px; }

        /* Змейка (скрыта по умолчанию) */
        #snake-engine { display: none; text-align: center; }
        canvas { background: #111; border: 2px solid #333; border-radius: 8px; margin-top: 10px; }

        /* Профиль */
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }

        /* Навигация */
        .nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(28, 28, 30, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 25px;
            border-top: 1px solid #333;
            z-index: 100;
        }
        .nav-link {
            color: var(--secondary);
            text-decoration: none;
            font-size: 11px;
            text-align: center;
            transition: 0.2s;
        }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="user-bar">
            <div class="user-avatar" id="u-pic">?</div>
            <div>
                <div id="u-name" style="font-weight: 600;">Завантаження...</div>
                <div style="font-size: 11px; color: var(--accent);">● Онлайн</div>
            </div>
        </div>
        
        <div class="card">
            <h3>📖 Сьогоднішні завдання</h3>
            <p style="color: var(--secondary); font-size: 14px;">Тут з'являться твої домашки після входу в Classroom.</p>
        </div>
    </div>

    <div id="games" class="page">
        <h2>🎮 Центр ігор</h2>
        
        <div id="games-list" class="game-grid">
            <div class="game-card" onclick="startSnake()">
                <i class="fas fa-snake"></i>
                <div>Змійка</div>
            </div>
            <div class="game-card" style="opacity: 0.5;">
                <i class="fas fa-question"></i>
                <div>Скоро...</div>
            </div>
        </div>

        <div id="snake-engine">
            <button onclick="stopGame()" style="background: none; color: var(--accent); border: 1px solid var(--accent); padding: 5px 15px; border-radius: 10px; margin-bottom: 10px;">⬅ Назад</button>
            <canvas id="snake" width="280" height="280"></canvas>
        </div>
    </div>

    <div id="profile" class="page">
        <h2>👤 Мій профіль</h2>
        <div class="card" style="text-align: center;">
            <div class="user-avatar" id="p-pic" style="width: 70px; height: 70px; margin: 0 auto 10px; font-size: 30px;">?</div>
            <h3 id="p-name">Користувач</h3>
        </div>

        <div class="card">
            <div class="stat-row"><span>🔥 Рекорд у Змійці</span><span id="high-score">0</span></div>
            <div class="stat-row"><span>📅 Дата реєстрації</span><span>Сьогодні</span></div>
            <div class="stat-row"><span>🌍 Мова</span><span>Українська</span></div>
        </div>

        <button onclick="tg.close()" style="width: 100%; background: #ff3b30; color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold;">Вийти з додатка</button>
    </div>

    <nav class="nav">
        <a href="javascript:void(0)" class="nav-link active" onclick="showPage('home', this)"><i class="fas fa-house"></i><br>Головна</a>
        <a href="javascript:void(0)" class="nav-link" onclick="showPage('games', this)"><i class="fas fa-gamepad"></i><br>Ігри</a>
        <a href="javascript:void(0)" class="nav-link" onclick="showPage('profile', this)"><i class="fas fa-user"></i><br>Профіль</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Переключение страниц
        function showPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
            
            if(pageId !== 'games') stopGame();
        }

        // Данные пользователя
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            document.getElementById('u-name').innerText = user.first_name;
            document.getElementById('p-name').innerText = user.first_name;
            document.getElementById('u-pic').innerText = user.first_name[0];
            document.getElementById('p-pic').innerText = user.first_name[0];
        }

        // Логика Змейки
        let gameInterval;
        function startSnake() {
            document.getElementById('games-list').style.display = 'none';
            document.getElementById('snake-engine').style.display = 'block';
            initSnake();
        }

        function stopGame() {
            clearInterval(gameInterval);
            document.getElementById('games-list').style.display = 'grid';
            document.getElementById('snake-engine').style.display = 'none';
        }

        function initSnake() {
            const canvas = document.getElementById("snake");
            const ctx = canvas.getContext("2d");
            const box = 20;
            let snake = [{x: 8 * box, y: 10 * box}];
            let food = { x: Math.floor(Math.random() * 14) * box, y: Math.floor(Math.random() * 14) * box };
            let d;

            document.addEventListener("keydown", (e) => {
                if(e.keyCode == 37 && d != "RIGHT") d = "LEFT";
                else if(e.keyCode == 38 && d != "DOWN") d = "UP";
                else if(e.keyCode == 39 && d != "LEFT") d = "RIGHT";
                else if(e.keyCode == 40 && d != "UP") d = "DOWN";
            });

            gameInterval = setInterval(() => {
                ctx.fillStyle = "#111";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                for(let i = 0; i < snake.length; i++) {
                    ctx.fillStyle = i == 0 ? "#34c759" : "#1a7a35";
                    ctx.fillRect(snake[i].x, snake[i].y, box, box);
                }
                ctx.fillStyle = "#ff3b30";
                ctx.fillRect(food.x, food.y, box, box);
                
                let snakeX = snake[0].x;
                let snakeY = snake[0].y;
                if( d == "LEFT") snakeX -= box;
                if( d == "UP") snakeY -= box;
                if( d == "RIGHT") snakeX += box;
                if( d == "DOWN") snakeY += box;

                if(snakeX == food.x && snakeY == food.y) {
                    food = { x: Math.floor(Math.random() * 14) * box, y: Math.floor(Math.random() * 14) * box };
                    let score = parseInt(document.getElementById('high-score').innerText);
                    document.getElementById('high-score').innerText = score + 1;
                } else { snake.pop(); }

                let newHead = {x: snakeX, y: snakeY};
                if(snakeX < 0 || snakeY < 0 || snakeX >= canvas.width || snakeY >= canvas.height) {
                    alert("Гра закінчена!");
                    stopGame();
                }
                snake.unshift(newHead);
            }, 150);
        }
    </script>
</body>
</html>
