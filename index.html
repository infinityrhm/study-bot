<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study UA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0c0c0e; --card: #1c1c1e; --accent: #34c759; --text: #ffffff; 
            --subtext: #8e8e93; --nav-bg: rgba(28, 28, 30, 0.9);
        }
        body.light-theme {
            --bg: #f2f2f7; --card: #ffffff; --text: #000000; 
            --subtext: #636366; --nav-bg: rgba(255, 255, 255, 0.9);
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, sans-serif; margin: 0; padding: 0; transition: 0.3s;
        }
        .page { display: none; padding: 20px; padding-bottom: 110px; animation: fadeIn 0.2s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-card {
            background: var(--card); border-radius: 24px; padding: 20px;
            margin-bottom: 15px; border: 1px solid rgba(142, 142, 147, 0.1);
        }

        /* Профиль и Аватар */
        .user-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .profile-pic { 
            width: 70px; height: 70px; border-radius: 50%; 
            background: var(--accent); display: flex; align-items: center; 
            justify-content: center; font-size: 28px; font-weight: bold; color: white;
            overflow: hidden; border: 3px solid var(--accent);
        }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; }
        .badge { background: var(--accent); color: white; font-size: 10px; padding: 2px 8px; border-radius: 10px; }

        /* XP Bar */
        .xp-container { margin-top: 10px; }
        .xp-bar { width: 100%; height: 8px; background: rgba(142,142,147,0.2); border-radius: 4px; overflow: hidden; }
        .xp-fill { width: 65%; height: 100%; background: var(--accent); }

        /* Достижения */
        .achievements-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .ach-item { background: var(--card); padding: 10px; border-radius: 15px; text-align: center; border: 1px solid rgba(142,142,147,0.1); }
        .ach-item i { font-size: 24px; color: #ffd700; margin-bottom: 5px; }
        .ach-item span { font-size: 10px; display: block; color: var(--subtext); }

        /* Навигация (Исправлена для белой темы) */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--nav-bg); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 12px 0 30px; 
            border-top: 1px solid rgba(142, 142, 147, 0.2);
        }
        .nav-item { color: var(--subtext); text-decoration: none; text-align: center; font-size: 11px; flex: 1; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; margin-bottom: 4px; }

        /* Кнопки */
        .settings-btn {
            background: rgba(142, 142, 147, 0.1); border: none; color: var(--text);
            padding: 12px; border-radius: 14px; font-size: 14px; flex: 1;
        }
        .settings-btn.active { background: var(--accent) !important; color: white !important; }
    </style>
</head>
<body class="dark-theme">

    <div id="home" class="page active">
        <div class="user-header">
            <div id="u-pic" class="profile-pic">?</div>
            <div>
                <h2 style="margin:0;" id="txt-hi">Ласкаво просимо!</h2>
                <div id="u-rank" class="badge">Новачок (Ранг I)</div>
            </div>
        </div>

        <div class="glass-card">
            <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;">
                <span>Рівень 4</span>
                <span id="txt-xp">680 / 1000 XP</span>
            </div>
            <div class="xp-bar"><div class="xp-fill"></div></div>
        </div>

        <div class="glass-card">
            <h3><i class="fas fa-calendar-day"></i> Розклад</h3>
            <p style="color: var(--subtext); font-size: 14px;">Сьогодні занять немає.</p>
        </div>
    </div>

    <div id="achievements" class="page">
        <h2>Досягнення</h2>
        <div class="achievements-grid">
            <div class="ach-item"><i class="fas fa-medal"></i><span>Перша 12-ка</span></div>
            <div class="ach-item"><i class="fas fa-fire"></i><span>7 днів поспіль</span></div>
            <div class="ach-item"><i class="fas fa-brain"></i><span>Геній</span></div>
            <div class="ach-item" style="opacity: 0.4;"><i class="fas fa-star"></i><span>Відмінник</span></div>
            <div class="ach-item" style="opacity: 0.4;"><i class="fas fa-snake"></i><span>Король змійки</span></div>
            <div class="ach-item" style="opacity: 0.4;"><i class="fas fa-book"></i><span>Читач</span></div>
        </div>
    </div>

    <div id="games" class="page">
        <h2>Ігровий центр</h2>
        <div class="glass-card" onclick="alert('Змійка скоро повернеться!')" style="text-align: center;">
            <i class="fas fa-snake" style="font-size: 40px; color: var(--accent);"></i>
            <h4>Змійка</h4>
        </div>
    </div>

    <div id="profile" class="page">
        <h2>Налаштування</h2>
        <div class="glass-card">
            <h4 id="txt-lang-label">Мова</h4>
            <div style="display:flex; gap:10px;">
                <button class="settings-btn active" onclick="changeLang('uk', this)">UA</button>
                <button class="settings-btn" onclick="changeLang('ru', this)">RU</button>
            </div>
        </div>
        <div class="glass-card">
            <h4 id="txt-theme-label">Тема</h4>
            <div style="display:flex; gap:10px;">
                <button id="btn-dark" class="settings-btn active" onclick="setTheme('dark', this)">Dark</button>
                <button id="btn-light" class="settings-btn" onclick="setTheme('light', this)">Light</button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active" onclick="nav('home', this)"><i class="fas fa-house"></i><br>Головна</a>
        <a href="#" class="nav-item" onclick="nav('achievements', this)"><i class="fas fa-trophy"></i><br>Успіхи</a>
        <a href="#" class="nav-item" onclick="nav('games', this)"><i class="fas fa-gamepad"></i><br>Ігри</a>
        <a href="#" class="nav-item" onclick="nav('profile', this)"><i class="fas fa-user-gear"></i><br>Профіль</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Инициализация данных пользователя
        function initUser() {
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                const u = tg.initDataUnsafe.user;
                document.getElementById('txt-hi').innerText = `Привіт, ${u.first_name}!`;
                
                const pic = document.getElementById('u-pic');
                if (u.photo_url) {
                    pic.innerHTML = `<img src="${u.photo_url}" alt="avatar">`;
                } else {
                    pic.innerText = u.first_name[0];
                }
                
                // Ранг на основе "удачи" или ID
                const ranks = ["Новачок", "Учень", "Магістр", "Легенда"];
                document.getElementById('u-rank').innerText = ranks[u.id % 4] + " (Ранг " + (u.id % 5 + 1) + ")";
            }
        }
        initUser();

        function nav(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function setTheme(theme, btn) {
            document.querySelectorAll('#profile .settings-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.body.className = theme + '-theme';
            tg.setHeaderColor(theme === 'dark' ? '#0c0c0e' : '#f2f2f7');
        }

        function changeLang(lang, btn) {
            // Логика смены языка как в прошлом примере
            btn.parentElement.querySelectorAll('.settings-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
