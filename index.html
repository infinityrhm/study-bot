<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
            --accent-color: #34c759; /* Зелений */
            --xp-color: #bf5af2;    /* Фіолетовий */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            padding-bottom: 80px; /* Місце для меню */
            user-select: none;
        }

        /* Картка профілю */
        .profile-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #2c2c2e;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .avatar {
            width: 55px;
            height: 55px;
            background: var(--accent-color);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        /* Досягнення */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin: 20px 0 10px 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .achieve-item {
            background: var(--card-bg);
            aspect-ratio: 1/1;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            text-align: center;
            color: var(--text-secondary);
            position: relative;
            border: 1px solid #2c2c2e;
        }

        .achieve-item i {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .locked {
            filter: grayscale(1) opacity(0.5);
        }

        .lock-icon {
            position: absolute;
            font-size: 10px;
            bottom: 5px;
        }

        /* Нижня навігація */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(28, 28, 30, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 25px 0;
            border-top: 1px solid #2c2c2e;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 10px;
            gap: 4px;
        }

        .nav-item.active {
            color: var(--accent-color);
        }

        .nav-item i {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="profile-section">
        <div class="user-info">
            <div class="avatar" id="avatar-char">У</div>
            <div>
                <div style="font-size: 18px; font-weight: bold;" id="username">Користувач</div>
                <div style="color: var(--text-secondary); font-size: 13px;">Онлайн</div>
            </div>
        </div>
        
        <div style="background: #121212; border-radius: 15px; padding: 15px; text-align: center;">
            <div style="font-size: 32px; font-weight: 800; color: var(--accent-color);">5.00</div>
            <div style="font-size: 12px; color: var(--text-secondary);">Середній бал</div>
        </div>
    </div>

    <div class="section-title">🏆 Досягнення</div>
    <div class="achievements-grid">
        <div class="achieve-item"><i class="fas fa-star" style="color: gold;"></i>Перша 12</div>
        <div class="achieve-item locked"><i class="fas fa-book"></i>10 оцінок <i class="fas fa-lock lock-icon"></i></div>
        <div class="achieve-item locked"><i class="fas fa-fire"></i>Стрік 7 <i class="fas fa-lock lock-icon"></i></div>
        <div class="achieve-item locked"><i class="fas fa-graduation-cap"></i>Магістр <i class="fas fa-lock lock-icon"></i></div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active"><i class="fas fa-house"></i>Головна</a>
        <a href="#" class="nav-item"><i class="fas fa-book-open"></i>Предмети</a>
        <a href="#" class="nav-item"><i class="fas fa-gamepad"></i>Ігри</a>
        <a href="#" class="nav-item"><i class="fas fa-user"></i>Профіль</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#000000';

        if (tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
            document.getElementById('avatar-char').innerText = tg.initDataUnsafe.user.first_name[0];
        }
    </script>
</body>
</html>
